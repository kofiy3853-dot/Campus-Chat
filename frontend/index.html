<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Campus-Networking | Connect & Collaborate</title>
    <meta name="description" content="Production-level campus messaging platform for students and staff." />
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var extra = !col ? '' : '\ncolumn: ' + col;
        extra += !error ? '' : '\nerror: ' + error;
        var deviceInfo = "\nDevice: " + navigator.userAgent + "\nPlatform: " + navigator.platform;
        alert("Error: " + msg + "\nurl: " + url + "\nline: " + line + extra + deviceInfo);
        return false;
      };
      window.onunhandledrejection = function(event) {
        alert("Unhandled Promise Rejection: " + event.reason);
      };
      // Failsafe: Try to hide splash screen as soon as DOM is ready
      document.addEventListener('DOMContentLoaded', function() {
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
          window.Capacitor.Plugins.SplashScreen.hide();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
